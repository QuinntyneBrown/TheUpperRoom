<div class="line-chart-widget" [class.line-chart-widget--dimmed]="connectionState() !== 'connected'" data-testid="line-chart-widget">
  <div class="chart-header">
    <span
      class="chart-badge"
      [class.chart-badge--connected]="connectionState() === 'connected'"
      [class.chart-badge--connecting]="connectionState() === 'connecting'"
      [class.chart-badge--disconnected]="connectionState() === 'disconnected'"
      [attr.data-state]="connectionState()"
      data-testid="chart-connection-badge"
      role="status"
    >
      <span class="material-symbols-outlined">{{ badgeConfig[connectionState()].icon }}</span>
      {{ badgeConfig[connectionState()].label }}
    </span>
  </div>
  <div class="chart-body">
    <canvas #canvas aria-label="{{ metric() }} chart" role="img"></canvas>
    @if (loading()) {
      <div class="chart-loading" data-testid="chart-loading" aria-busy="true" aria-label="Loading chart data">
        <div class="chart-loading__spinner"></div>
      </div>
    } @else if (loadError()) {
      <div class="chart-load-error" data-testid="chart-load-error" role="alert">
        <mat-icon aria-hidden="true">error_outline</mat-icon>
        <span>Failed to load chart data.</span>
      </div>
    }
  </div>
</div>
