<div class="dashboard-page" data-testid="dashboard-page">
  <header class="dashboard-page__header">
    <h1>Dashboard</h1>
    <button class="dashboard-page__add-btn" data-testid="add-widget-btn" (click)="showCatalog.set(true)">
      + Add widget
    </button>
  </header>

  @if (showCatalog()) {
    <ur-widget-catalog-dialog
      (closed)="showCatalog.set(false)"
      (selected)="onWidgetAdded($event)"
    ></ur-widget-catalog-dialog>
  }

  @if (items().length === 0) {
    <div class="dashboard-page__empty" data-testid="dashboard-empty">
      <p>No widgets yet.</p>
      <button class="dashboard-page__add-cta" data-testid="add-widget-cta" (click)="showCatalog.set(true)">
        Add widget
      </button>
    </div>
  } @else {
    <gridster [options]="options">
      @for (item of items(); track item.id) {
        <gridster-item [item]="item">
          <div class="dashboard-widget" [attr.data-testid]="'widget-' + item.id">
            <header class="dashboard-widget__header">
              <span class="dashboard-widget__type">{{ item.type }}</span>
              <button class="dashboard-widget__remove" (click)="removeWidget(item)" aria-label="Remove widget">
                <mat-icon>close</mat-icon>
              </button>
            </header>
            <div class="dashboard-widget__body">
              @if (item.type === 'line-chart') {
                <ur-line-chart-widget [metric]="$any(item.config?.['metric']) ?? 'contactsCreatedDaily'" />
              }
            </div>
          </div>
        </gridster-item>
      }
    </gridster>
  }
</div>
