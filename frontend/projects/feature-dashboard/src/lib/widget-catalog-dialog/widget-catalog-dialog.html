<ur-dialog
  title="Widget catalog"
  subtitle="Drag a widget onto your dashboard, or click to add it at the next free slot."
  closeLabel="Close"
  [showActions]="false"
  (closed)="ref.close()"
  data-testid="widget-catalog-dialog"
>
  <div class="widget-catalog-dialog__body">
    <label class="widget-catalog-dialog__search">
      <mat-icon aria-hidden="true">search</mat-icon>
      <input
        type="search"
        placeholder="Search the workspace..."
        aria-label="Search widget catalog"
        data-testid="widget-catalog-search"
        [ngModel]="searchTerm()"
        (ngModelChange)="searchTerm.set($event)"
      />
    </label>
    @if (sections().length === 0) {
      <p class="widget-catalog-dialog__no-results" data-testid="widget-catalog-no-results">
        No widgets match "{{ searchTerm() }}"
      </p>
    }
    @for (section of sections(); track section.label) {
      <div class="widget-catalog-dialog__section">
        <h3 class="widget-catalog-dialog__section-label">{{ section.label }}</h3>
        <ul class="widget-catalog-dialog__list">
          @for (wt of section.entries; track wt.type) {
            <li class="widget-catalog-dialog__entry-item">
              <button
                type="button"
                class="widget-catalog-dialog__entry"
                [attr.data-testid]="'widget-type-' + wt.type"
                (click)="pick(wt)"
                [attr.aria-label]="'Add ' + wt.label + ' widget'"
              >
                <div class="widget-catalog-dialog__icon">
                  <mat-icon aria-hidden="true">{{ wt.icon }}</mat-icon>
                </div>
                <div class="widget-catalog-dialog__info">
                  <span class="widget-catalog-dialog__label">{{ wt.label }}</span>
                  <span class="widget-catalog-dialog__desc">{{ wt.description }}</span>
                </div>
                <span class="widget-catalog-dialog__add" aria-hidden="true">
                  <mat-icon aria-hidden="true">add</mat-icon>
                </span>
              </button>
            </li>
          }
        </ul>
      </div>
    }
  </div>
</ur-dialog>
