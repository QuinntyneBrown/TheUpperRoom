<div class="auth-page">
<div class="auth-card">
  <div class="auth-card__wordmark" data-testid="sign-in-wordmark">
    <mat-icon class="auth-card__wordmark-logo">church</mat-icon>
    <span class="auth-card__wordmark-name">The Upper Room</span>
  </div>
  <p class="auth-subtitle" data-testid="sign-in-subtitle">Sign in to your City Lead workspace</p>
  @if (showReturnToast()) {
    <div class="sign-in-return-toast" role="status" data-testid="sign-in-return-toast">
      <mat-icon>info</mat-icon>
      <div class="sign-in-return-toast__body">
        <span>Please sign in to continue</span>
        <span class="sign-in-return-toast__sub">We'll bring you back to where you were.</span>
      </div>
      <button class="sign-in-return-toast__dismiss" (click)="showReturnToast.set(false)" aria-label="Dismiss">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  }
  @if (error()) {
    <div role="alert" class="auth-error" data-testid="sign-in-error">{{ error() }}</div>
  }
  <form (ngSubmit)="submit()" novalidate>
    <ur-input
      label="Email"
      type="email"
      [value]="email()"
      autocomplete="email"
      required
      (valueChange)="email.set($event)"
    />
    <ur-input
      label="Password"
      type="password"
      [value]="password()"
      autocomplete="current-password"
      required
      (valueChange)="password.set($event)"
    />
    <div class="auth-opts-row">
      <label class="auth-opts-row__remember">
        <input
          #remember
          type="checkbox"
          data-testid="sign-in-remember-me"
          [checked]="rememberMe()"
          (change)="rememberMe.set(remember.checked)"
        />
        Remember me
      </label>
      <a routerLink="/auth/forgot-password" class="auth-opts-row__forgot">Forgot password?</a>
    </div>
    <ur-button type="submit" [disabled]="loading()" fullWidth data-testid="sign-in-submit-btn">
      {{ loading() ? 'Signing in…' : 'Sign in' }}
    </ur-button>
  </form>
  <p class="auth-card__signup-row">
    <span>New to The Upper Room?</span>
    <a routerLink="/auth/register">Request access</a>
  </p>
</div>

</div>
