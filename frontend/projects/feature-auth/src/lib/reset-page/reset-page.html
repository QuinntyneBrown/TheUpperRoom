<div class="auth-page">
<div class="auth-card">
  <h1 data-testid="reset-heading">Choose a new password</h1>
  @if (error()) {
    <div role="alert" class="auth-error" data-testid="reset-error">{{ error() }}</div>
  }
  <form (ngSubmit)="submit()" novalidate>
    <ur-input
      label="New password"
      type="password"
      [value]="newPassword()"
      autocomplete="new-password"
      required
      data-testid="reset-new-password-input"
      (valueChange)="newPassword.set($event)"
    />
    <ur-input
      label="Confirm new password"
      type="password"
      [value]="confirmPassword()"
      autocomplete="new-password"
      required
      data-testid="reset-confirm-password-input"
      (valueChange)="confirmPassword.set($event)"
    />
    @if (!passwordsMatch()) {
      <div role="alert" class="auth-error" data-testid="reset-password-mismatch-error">Passwords do not match.</div>
    }
    <ur-button type="submit" [disabled]="!canSubmit()" fullWidth data-testid="reset-password-submit-btn">
      {{ loading() ? 'Saving…' : 'Set new password' }}
    </ur-button>
  </form>
</div>

</div>
