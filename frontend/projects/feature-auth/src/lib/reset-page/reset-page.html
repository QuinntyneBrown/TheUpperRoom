<div class="auth-page">
<section class="auth-card" aria-labelledby="reset-heading">
  <div class="auth-card__wordmark" data-testid="reset-wordmark">
    <mat-icon class="auth-card__wordmark-logo" aria-hidden="true">church</mat-icon>
    <span class="auth-card__wordmark-name">The Upper Room</span>
  </div>
  <h1 id="reset-heading" data-testid="reset-heading">Choose a new password</h1>
  <p class="auth-subtitle" data-testid="reset-subtitle">Pick something you haven't used before — long, memorable, and unique to The Upper Room.</p>
  @if (error(); as e) {
    <ur-alert
      data-testid="reset-error"
      variant="danger"
      [title]="e.title"
      [message]="e.message"
    />
  }
  <form (ngSubmit)="submit()" novalidate>
    <ur-input
      label="New password"
      type="password"
      [value]="newPassword()"
      autocomplete="new-password"
      required
      inputTestId="reset-new-password-input"
      (valueChange)="newPassword.set($event)"
    />
    <ur-input
      label="Confirm new password"
      type="password"
      [value]="confirmPassword()"
      autocomplete="new-password"
      required
      inputTestId="reset-confirm-password-input"
      (valueChange)="confirmPassword.set($event)"
    />
    @if (!passwordsMatch()) {
      <div role="alert" class="auth-error" data-testid="reset-password-mismatch-error">Passwords do not match.</div>
    }
    <ur-button type="submit" [disabled]="!canSubmit()" fullWidth data-testid="reset-password-submit-btn">
      {{ loading() ? 'Saving…' : 'Set new password' }}
    </ur-button>
  </form>
  <ur-alert
    data-testid="reset-expiry-warning"
    variant="warning"
    title="Link expires soon"
    message="Recovery links remain valid for 30 minutes from issue."
  />
  <a routerLink="/auth/sign-in" data-testid="reset-back-link">Back to sign in</a>
</section>

</div>
