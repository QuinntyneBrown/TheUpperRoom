<div class="page-container">
  <h1 data-testid="contact-create-title">New contact</h1>
  <p class="page-container__subtitle" data-testid="new-contact-subtitle">Add someone to your city's contact directory.</p>
  <ur-contact-form
    [errors]="errors()"
    [loading]="loading()"
    [showNotes]="false"
    submitLabel="Save contact"
    cancelRoute="/contacts"
    (formSubmit)="save($event)"
  />
</div>

@if (saveError()) {
  <div class="create-error-toast" data-testid="create-save-error-toast" role="alert">
    <mat-icon aria-hidden="true">error_outline</mat-icon>
    <span>Save failed. Please try again.</span>
  </div>
}
