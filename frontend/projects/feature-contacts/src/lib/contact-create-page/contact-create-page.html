<div class="page-container">
  <h1>New contact</h1>
  <ur-contact-form
    [errors]="errors()"
    [loading]="loading()"
    [showNotes]="false"
    submitLabel="Save contact"
    cancelRoute="/contacts"
    (formSubmit)="save($event)"
  />
</div>

@if (saveError()) {
  <div class="create-error-toast" data-testid="create-save-error-toast" role="alert">
    <mat-icon>error_outline</mat-icon>
    <span>Save failed. Please try again.</span>
  </div>
}
