<ur-dialog title="New contact" subtitle="Add someone to your city's contact directory." titleTestId="new-contact-dialog-title" subtitleTestId="new-contact-subtitle" icon="person_add_alt" (closed)="ref.close()" data-testid="new-contact-dialog">
  <form id="new-contact-form" class="ncd-form" (ngSubmit)="save()" novalidate>
    <div class="ncd-row">
      <ur-input label="First name" required
        [value]="firstName()" [error]="fieldError('firstName')"
        errorTestId="new-contact-firstName-error"
        (valueChange)="firstName.set($event)" />
      <ur-input label="Last name" required
        [value]="lastName()" [error]="fieldError('lastName')"
        errorTestId="new-contact-lastName-error"
        (valueChange)="lastName.set($event)" />
    </div>
    <ur-input label="Email" type="email" required
      autocomplete="email"
      [value]="email()" [error]="fieldError('email')"
      errorTestId="new-contact-email-error"
      (valueChange)="email.set($event)" />
    <div class="ncd-row">
      <ur-input label="Phone" type="tel"
        autocomplete="tel"
        [value]="phone()" [error]="fieldError('phone')"
        errorTestId="new-contact-phone-error"
        (valueChange)="phone.set($event)" />
      <ur-input label="City"
        [value]="city()" [error]="fieldError('city')"
        errorTestId="new-contact-city-error"
        (valueChange)="city.set($event)" />
    </div>
    <p class="ncd-hint">
      <mat-icon aria-hidden="true">info</mat-icon>
      Fill required fields (*) to enable Save
    </p>
  </form>

  <div ur-dialog-actions>
    <ur-button variant="ghost" type="button" (click)="ref.close()" data-testid="new-contact-dialog-cancel">Cancel</ur-button>
    <ur-button type="submit" form="new-contact-form"
      [disabled]="!canSave()" data-testid="new-contact-dialog-submit">
      {{ loading() ? 'Saving…' : 'Create contact' }}
    </ur-button>
  </div>
</ur-dialog>
