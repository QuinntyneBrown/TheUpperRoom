<div class="global-team-detail" data-testid="global-team-detail">
  <a routerLink="/teams" class="global-team-detail__back" data-testid="global-team-back-link">
    <mat-icon aria-hidden="true">arrow_back</mat-icon> All Teams
  </a>

  @if (loading()) {
    <div class="global-team-detail__loading" data-testid="global-team-loading" aria-busy="true" aria-label="Loading team">
      @for (_ of [1,2,3]; track $index) {
        <div class="global-team-detail__loading-row"></div>
      }
    </div>
  } @else if (loadError()) {
    <div class="global-team-detail__error" data-testid="global-team-load-error" role="alert">
      <mat-icon aria-hidden="true">error_outline</mat-icon>
      <span>Failed to load team.</span>
    </div>
  } @else if (detail(); as d) {
    <h1 class="global-team-detail__title" data-testid="global-team-city">{{ d.city }}</h1>
    <dl class="global-team-detail__stats">
      <div class="global-team-detail__stat">
        <dd class="global-team-detail__stat-value">{{ d.memberCount ?? '—' }}</dd>
        <dt class="global-team-detail__stat-label">Members</dt>
      </div>
      <div class="global-team-detail__stat">
        <dd class="global-team-detail__stat-value">{{ d.activeHackathonCount }}</dd>
        <dt class="global-team-detail__stat-label">Active Hackathons</dt>
      </div>
      <div class="global-team-detail__stat">
        <dd class="global-team-detail__stat-value">{{ d.partnerCount }}</dd>
        <dt class="global-team-detail__stat-label">Partners</dt>
      </div>
    </dl>
  }
</div>
