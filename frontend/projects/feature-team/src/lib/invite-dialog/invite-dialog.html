<ur-dialog title="Invite team member" titleTestId="invite-dialog-title" icon="person_add" closeLabel="Cancel" (closed)="ref.close()" data-testid="invite-dialog">
  <form (submit)="$event.preventDefault(); submit()" class="invite-form">
    <div class="invite-form__field">
      <label for="inviteEmail">Email address <span aria-hidden="true">*</span></label>
      <input
        id="inviteEmail"
        type="email"
        placeholder="member@example.com"
        required
        [value]="email()"
        (input)="email.set($any($event.target).value)"
        autocomplete="email"
        aria-describedby="inviteEmail-error"
        data-testid="invite-email-input"
      />
      @if (errors()['email']) {
        <span id="inviteEmail-error" class="invite-form__error" data-testid="invite-email-error">{{ errors()['email'] }}</span>
      }
    </div>

    <fieldset class="invite-form__field invite-form__roles-group">
      <legend class="invite-form__label">Roles</legend>
      <div class="invite-form__roles">
        @for (role of allRoles; track role) {
          <label class="invite-form__role-opt">
            <input
              type="checkbox"
              [checked]="selectedRoles().has(role)"
              (change)="toggleRole(role)"
              [attr.data-testid]="'invite-role-' + role"
            />
            {{ roleLabel(role) }}
          </label>
        }
      </div>
      @if (errors()['roles']) {
        <span class="invite-form__error" data-testid="invite-roles-error">{{ errors()['roles'] }}</span>
      }
    </fieldset>

    @if (saveError()) {
      <div class="invite-save-error" data-testid="invite-save-error" role="alert">
        <mat-icon aria-hidden="true">error_outline</mat-icon>
        <span data-testid="invite-save-error-message">Invite failed. Please try again.</span>
      </div>
    }

    <div class="invite-form__actions">
      <ur-button type="button" variant="ghost" (click)="ref.close()" data-testid="invite-dialog-cancel-btn">Cancel</ur-button>
      <ur-button type="submit" [disabled]="saving()" data-testid="send-invite-btn">
        {{ saving() ? 'Sending…' : 'Send invite' }}
      </ur-button>
    </div>
  </form>
</ur-dialog>
