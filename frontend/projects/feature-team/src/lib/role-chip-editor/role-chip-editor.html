<div class="role-chips" data-testid="role-chip-editor">
  @for (role of roles; track role) {
    <button
      class="role-chip"
      [class.role-chip--active]="hasRole(role)"
      [class.role-chip--disabled]="!canEdit() || saving()"
      [disabled]="!canEdit() || saving()"
      [attr.aria-pressed]="hasRole(role)"
      [attr.data-testid]="'role-chip-' + role"
      (click)="toggle(role)"
    >{{ roleLabel(role) }}</button>
  }
  @if (toggleError()) {
    <div class="role-chip-error" data-testid="role-toggle-error" role="alert">
      <mat-icon aria-hidden="true">error_outline</mat-icon>
      <span data-testid="role-toggle-error-message">Failed to update role. Please try again.</span>
    </div>
  }
</div>
