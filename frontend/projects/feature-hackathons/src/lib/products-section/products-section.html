<section class="products-section" aria-label="Products">
  <div class="products-section__header">
    <h2 class="products-section__title" data-testid="products-section-title">Products</h2>
    <ur-button variant="secondary" (click)="onAddClick()" data-testid="add-product-btn">+ Add product</ur-button>
  </div>

  @if (products().length === 0) {
    <div class="products-section__empty" data-testid="products-section-empty">
      <div class="products-section__empty-icon-wrap" data-testid="products-empty-icon-wrap" aria-hidden="true">
        <mat-icon aria-hidden="true">inventory_2</mat-icon>
      </div>
      <h3 data-testid="products-empty-title">No products yet</h3>
    </div>
  } @else {
    <div class="products-section__list">
      @for (p of products(); track p.id) {
        <div class="product-card" [attr.data-testid]="'product-card-' + p.id">
          <p class="product-card__name">{{ p.name }}</p>
          @if (p.description) {
            <p class="product-card__desc">{{ p.description }}</p>
          }
          <div class="product-card__links">
            @if (p.repoUrl) {
              <a [href]="p.repoUrl" target="_blank" rel="noopener" class="product-card__link">Repo</a>
            }
            @if (p.demoUrl) {
              <a [href]="p.demoUrl" target="_blank" rel="noopener" class="product-card__link">Demo</a>
            }
          </div>
        </div>
      }
    </div>
  }
</section>
