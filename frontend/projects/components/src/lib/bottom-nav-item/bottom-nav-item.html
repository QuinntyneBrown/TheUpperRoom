<a
  mat-button
  [routerLink]="href"
  routerLinkActive="ur-bottom-nav-item--active"
  class="ur-bottom-nav-item"
  [disabled]="disabled"
  #rla="routerLinkActive"
  [attr.aria-current]="rla.isActive ? 'page' : null"
>
  @if (icon) {
    <mat-icon class="ur-bottom-nav-item__icon" aria-hidden="true">{{ icon }}</mat-icon>
  }
  <span class="ur-bottom-nav-item__label">{{ label }}<ng-content /></span>
</a>
