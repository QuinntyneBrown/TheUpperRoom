<mat-card [class]="alertClass" appearance="outlined" [attr.role]="ariaRole">
  <mat-icon class="ur-alert__icon" aria-hidden="true">{{ resolvedIcon }}</mat-icon>

  <div class="ur-alert__body">
    @if (title) {
      <h3 class="ur-alert__title" [attr.data-testid]="titleTestId || null">{{ title }}</h3>
    }

    @if (message) {
      <p class="ur-alert__message" [attr.data-testid]="messageTestId || null">{{ message }}</p>
    }

    <ng-content />
  </div>
</mat-card>
