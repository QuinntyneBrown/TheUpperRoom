<mat-form-field class="ur-search" appearance="outline" subscriptSizing="dynamic">
  <mat-icon matPrefix class="ur-search__icon" aria-hidden="true">search</mat-icon>
  <input
    matInput
    [id]="id"
    type="search"
    [value]="value"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [attr.aria-label]="ariaLabel"
    [attr.data-testid]="inputTestId || null"
    (input)="onInput($event)"
    (keydown.enter)="onSubmit()"
  />
</mat-form-field>
