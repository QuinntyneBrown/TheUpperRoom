<ng-template #content><ng-content /></ng-template>

@if (variant === 'fab') {
  <button
    mat-fab
    [type]="type"
    [attr.form]="form || null"
    [disabled]="disabled"
    [attr.aria-label]="ariaLabel || 'Action'"
    [class]="buttonClass"
    [attr.data-testid]="testId || null"
    (click)="onClick($event)"
  >
    <mat-icon aria-hidden="true">{{ icon || 'add' }}</mat-icon>
  </button>
} @else if (variant === 'icon') {
  <button
    mat-icon-button
    [type]="type"
    [attr.form]="form || null"
    [disabled]="disabled"
    [attr.aria-label]="ariaLabel || 'Action'"
    [class]="buttonClass"
    [attr.data-testid]="testId || null"
    (click)="onClick($event)"
  >
    <mat-icon aria-hidden="true">{{ icon || 'more_horiz' }}</mat-icon>
  </button>
} @else if (variant === 'outline') {
  <button
    mat-stroked-button
    [type]="type"
    [attr.form]="form || null"
    [disabled]="disabled"
    [attr.aria-label]="ariaLabel || null"
    [class]="buttonClass"
    [attr.data-testid]="testId || null"
    (click)="onClick($event)"
  >
    @if (icon && iconPosition === 'start') {
      <mat-icon aria-hidden="true">{{ icon }}</mat-icon>
    }
    <span class="ur-button__label"><ng-container *ngTemplateOutlet="content" /></span>
    @if (icon && iconPosition === 'end') {
      <mat-icon aria-hidden="true">{{ icon }}</mat-icon>
    }
  </button>
} @else if (variant === 'ghost') {
  <button
    mat-button
    [type]="type"
    [attr.form]="form || null"
    [disabled]="disabled"
    [attr.aria-label]="ariaLabel || null"
    [class]="buttonClass"
    [attr.data-testid]="testId || null"
    (click)="onClick($event)"
  >
    @if (icon && iconPosition === 'start') {
      <mat-icon aria-hidden="true">{{ icon }}</mat-icon>
    }
    <span class="ur-button__label"><ng-container *ngTemplateOutlet="content" /></span>
    @if (icon && iconPosition === 'end') {
      <mat-icon aria-hidden="true">{{ icon }}</mat-icon>
    }
  </button>
} @else {
  <button
    mat-flat-button
    [type]="type"
    [attr.form]="form || null"
    [disabled]="disabled"
    [attr.aria-label]="ariaLabel || null"
    [class]="buttonClass"
    [attr.data-testid]="testId || null"
    (click)="onClick($event)"
  >
    @if (icon && iconPosition === 'start') {
      <mat-icon aria-hidden="true">{{ icon }}</mat-icon>
    }
    <span class="ur-button__label"><ng-container *ngTemplateOutlet="content" /></span>
    @if (icon && iconPosition === 'end') {
      <mat-icon aria-hidden="true">{{ icon }}</mat-icon>
    }
  </button>
}
