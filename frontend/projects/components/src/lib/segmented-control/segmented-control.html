<mat-button-toggle-group
  class="ur-segmented-control"
  [value]="value"
  [disabled]="disabled"
  [attr.aria-label]="ariaLabel"
  (change)="onChange($event)"
>
  @for (option of options; track option.value) {
    <mat-button-toggle
      class="ur-segmented-control__option"
      [value]="option.value"
      [disabled]="option.disabled"
      [attr.data-testid]="option.testId || null"
    >
      @if (option.icon) {
        <mat-icon class="ur-segmented-control__icon" aria-hidden="true">{{ option.icon }}</mat-icon>
      }
      <span class="ur-segmented-control__label">{{ option.label }}</span>
      @if (option.count !== undefined) {
        <span class="ur-segmented-control__count">{{ option.count }}</span>
      }
    </mat-button-toggle>
  }
</mat-button-toggle-group>
