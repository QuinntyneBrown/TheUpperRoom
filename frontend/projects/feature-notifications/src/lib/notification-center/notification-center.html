<div class="notification-center" data-testid="notification-center">
  <button
    class="notification-center__bell"
    data-testid="notification-bell"
    (click)="toggle()"
    aria-label="Notifications"
    [attr.aria-expanded]="open()"
    mat-icon-button
  >
    <mat-icon>notifications</mat-icon>
    @if (unreadCount() > 0) {
      <span class="notification-center__badge" data-testid="unread-badge" aria-live="polite">{{ unreadCount() }}</span>
    }
  </button>

  @if (open()) {
    <div class="notification-center__panel" role="region" aria-label="Notifications panel" data-testid="notifications-panel">
      <header class="notification-center__panel-header">
        <h2>Notifications</h2>
        @if (unreadCount() > 0) {
          <button class="notification-center__mark-all" data-testid="mark-all-read" (click)="markAllRead()">Mark all read</button>
        }
      </header>
      @if (notifications().length === 0) {
        <p class="notification-center__empty">No notifications.</p>
      } @else {
        <ul class="notification-center__list">
          @for (n of notifications(); track n.id) {
            <li class="notification-center__item" [class.notification-center__item--unread]="!n.isRead" [attr.data-testid]="'notification-' + n.id">
              <span class="notification-center__kind">{{ n.kind }}</span>
              <span class="notification-center__time">{{ n.createdAt | date:'short' }}</span>
              @if (!n.isRead) {
                <button class="notification-center__read-btn" (click)="markRead(n.id)" [attr.aria-label]="'Mark ' + n.kind + ' read'"><mat-icon>check</mat-icon></button>
              }
            </li>
          }
        </ul>
      }
    </div>
  }
</div>
