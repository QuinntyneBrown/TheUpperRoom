<ur-dialog
  title="New partner"
  titleTestId="partner-create-dialog-title"
  icon="domain_add"
  closeLabel="Cancel"
  (closed)="cancel()"
  data-testid="partner-create-form"
>
  <form (ngSubmit)="submit()" class="partner-form">
    <ur-input
      label="Partner name"
      type="text"
      required
      placeholder="e.g. FaithTech Toronto"
      [value]="name()"
      [error]="errors()['name'] ?? ''"
      errorTestId="partner-create-name-error"
      autocomplete="organization"
      (valueChange)="name.set($event)"
    />

    <div class="partner-form__row">
      <ur-input
        label="City"
        type="text"
        placeholder="e.g. Toronto, ON"
        [value]="city()"
        [error]="errors()['city'] ?? ''"
        errorTestId="partner-create-city-error"
        (valueChange)="city.set($event)"
      />
      <ur-input
        label="Website"
        type="url"
        placeholder="https://"
        [value]="website()"
        [error]="errors()['website'] ?? ''"
        errorTestId="partner-create-website-error"
        (valueChange)="website.set($event)"
      />
    </div>

    <div class="partner-form__field">
      <span id="partnerStageLabel" class="partner-form__label">Stage</span>
      <div class="partner-form__stage-opts" role="radiogroup" aria-labelledby="partnerStageLabel">
        @for (s of stages; track s.value) {
          <button
            type="button"
            role="radio"
            class="partner-form__stage-opt"
            [class.partner-form__stage-opt--selected]="stage() === s.value"
            [attr.aria-checked]="stage() === s.value"
            (click)="stage.set(s.value)"
          >{{ s.label }}</button>
        }
      </div>
    </div>

    <div class="partner-form__field">
      <label class="partner-form__label" for="partnerNote">First note (optional)</label>
      <textarea
        id="partnerNote"
        placeholder="Add context, prayer requests, action items…"
        [value]="description()"
        (input)="description.set($any($event.target).value)"
        rows="3"
      ></textarea>
    </div>

    <div class="partner-form__actions">
      <ur-button type="button" variant="ghost" (click)="cancel()" data-testid="partner-create-cancel-btn">Cancel</ur-button>
      <ur-button type="submit" [disabled]="saving()" data-testid="add-partner-btn">
        {{ saving() ? 'Saving…' : 'Create partner' }}
      </ur-button>
    </div>
  </form>
</ur-dialog>

@if (saveError()) {
  <div class="create-error-toast" data-testid="create-save-error-toast" role="alert">
    <mat-icon aria-hidden="true">error_outline</mat-icon>
    <span data-testid="partner-create-save-error-message">Save failed. Please try again.</span>
  </div>
}
